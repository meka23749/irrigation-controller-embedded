name: CI -- Irrigation Controller Embedded

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  native-tests:
    name: Native Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile and run native tests
        run: |
          gcc -I src -I tests/unity tests/test_irrigation_controller.c src/irrigation_controller.c tests/unity/unity.c -o test_native
          ./test_native

  arm-cross-compile:
    name: ARM Cross-Compile and QEMU Simulation
    runs-on: ubuntu-latest
    needs: native-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi qemu-system-arm

      - name: Cross-compile firmware for ARM
        run: |
          arm-none-eabi-gcc -mcpu=cortex-m4 -mthumb -nostdlib -T src/linker.ld src/startup.c src/main.c src/irrigation_controller.c -o firmware.elf

      - name: Run firmware in QEMU (timeout check)
        run: |
          timeout 3 qemu-system-arm -M lm3s6965evb -nographic -kernel firmware.elf || true
          echo "Firmware executed without crash"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-elf
          path: firmware.elf